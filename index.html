<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Content Security Policy — enforces the "no uploads, 100% private" promise.
      `connect-src` is intentionally narrow: only the CDNs that deliver the
      Tesseract OCR engine and language data are permitted. There is no path
      for user file content to leave the browser.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net https://unpkg.com; worker-src 'self' blob: https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://cdn.jsdelivr.net https://unpkg.com https://tessdata.projectnaptha.com; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'"
    />

    <!-- SVG favicon (primary + only) -->
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />

    <!-- Optional: Safari pinned tab (nice touch for macOS) -->
    <link rel="mask-icon" href="/icons/favicon.svg" color="#2563EB" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="color-scheme" content="light dark" />

    <!-- Preload primary font so first paint uses Inter, not the system fallback -->
    <link rel="preload" href="/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Resource hints for runtime CDNs (PDF.js worker, Tesseract.js core + lang data) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="dns-prefetch" href="https://tessdata.projectnaptha.com" />

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CloakPDF" />

    <!-- SEO -->
    <meta
      name="description"
      content="CloakPDF — free offline PDF toolkit that runs entirely in your browser. Merge, split, compress, rotate, reorder, delete pages, add watermarks, signatures & more. No uploads, 100% private."
    />
    <meta
      name="keywords"
      content="offline pdf tool, pdf editor offline, free pdf merger, compress pdf online, split pdf, rotate pdf, pdf watermark, pdf signature, browser pdf toolkit, private pdf editor, no upload pdf tool"
    />
    <link rel="canonical" href="https://cloakpdf.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cloakpdf.app/" />
    <meta
      property="og:title"
      content="CloakPDF — Free Offline PDF Toolkit | No Uploads, 100% Private"
    />
    <meta
      property="og:description"
      content="Merge, split, compress, rotate, watermark & sign PDFs — entirely in your browser. No file uploads, no servers, completely private."
    />
    <meta property="og:image" content="https://cloakpdf.app/icons/og-image.png" />
    <meta property="og:site_name" content="CloakPDF" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CloakPDF — Free Offline PDF Toolkit" />
    <meta
      name="twitter:description"
      content="Merge, split, compress, rotate & sign PDFs offline in your browser. No uploads, 100% private."
    />
    <meta name="twitter:image" content="https://cloakpdf.app/icons/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "CloakPDF",
        "url": "https://cloakpdf.app",
        "description": "Free offline PDF toolkit that runs entirely in your browser. Merge, split, compress, rotate, reorder, delete pages, add watermarks, signatures and more. No uploads, 100% private.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Merge PDFs",
          "Split & Extract Pages",
          "Compress PDF",
          "Rotate Pages",
          "Reorder Pages",
          "Delete Pages",
          "Add Watermark",
          "Add Signature",
          "PDF to Image",
          "Images to PDF",
          "OCR PDF",
          "Crop Pages",
          "Add Page Numbers",
          "Redact PDF",
          "PDF Password Protection",
          "Edit Metadata"
        ],
        "browserRequirements": "Requires a modern web browser with JavaScript enabled"
      }
    </script>

    <title>CloakPDF — Free Offline PDF Toolkit | Merge, Split, Compress & More</title>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
