<!doctype html>
<!--
  og-image.html — Source page for the Open Graph / Twitter card PNG
  at public/icons/og-image.png.

  scripts/build-og-image.mjs loads this file in headless Chrome and
  screenshots the #stage (a 1200 × 630 fixed-size box). The page
  mounts the same Grainient WebGL backdrop the live app uses, with
  the brand's foreground SVG (mark, wordmark, tagline, feature tiles,
  footer cluster) layered on top.

  Time is pinned to a fixed iTime value before screenshotting, so
  re-running the script always produces the same pixels — convenient
  for committing the PNG to git without spurious diffs.

  ─── Reusing in other Cloak apps (CloakIMG, CloakResume, CloakYard)

  Four things vary between apps; everything else (the shader, the
  ogl import, the readiness signalling for the screenshotter) is
  brand-agnostic and can be copied verbatim. See docs/og-image.md
  for the full porting guide.

    1. PALETTE constant (in the <script type="module"> block below).
       Mirror the GRAINIENT_LIGHT export from the app's grainient
       config (e.g. src/config/grainient.ts in CloakPDF, or
       src/constants/grainient.ts in CloakIMG). Use the LIGHT palette
       — the OG card is rendered in light mode regardless of the
       viewer's preference, since social platforms cache one PNG.

    2. PARAMS constant (same script block). Mirror the values that
       the app's `<Grainient ... />` mount-site uses — typically the
       three GRAINIENT_MOTION fields (timeSpeed, warpSpeed,
       saturation). Don't lower these to soften the OG card; the
       tone-down overlay (#3 below) is the dial for that.

    3. #tone-down opacity (in <style>). Single CSS value. Dampens
       the shader output for the static card without touching shader
       params. Default 0.35; lower for louder, higher for quieter.

    4. The foreground <svg id="foreground"> contents — brand mark
       (favicon shape), wordmark colours, tagline copy, feature
       tiles, URL chip. Replace these per brand. The viewBox stays
       1200 × 630.

  Re-render with: `node scripts/build-og-image.mjs`. The output lands
  at public/icons/og-image.png, which is what each Cloak app's
  <meta og:image> in index.html points at.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CloakPDF OG Image Source</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
      /* Fixed-size stage that the headless screenshot crops to. The
         body has zero margin, so the stage starts at (0,0) and is
         exactly 1200 × 630 — the dimensions Open Graph + Twitter
         cards expect. */
      #stage {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        isolation: isolate;
      }
      /* Grainient canvas anchors the backdrop. It paints first; the
         tone-down overlay sits above it (z-index: 1); the foreground
         SVG sits on top of both (z-index: 2). */
      #grainient-host {
        position: absolute;
        inset: 0;
        z-index: 0;
      }
      #grainient-host canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      /* Tone-down layer — a flat white wash at fixed opacity sitting
         between the Grainient canvas and the foreground SVG. Lets the
         shader run with the exact live-page palette + params (so the
         live app and this preview don't drift), then dampens the field
         purely for the OG card. Adjust opacity here if the backdrop
         needs to read louder or quieter; nothing else moves. */
      #tone-down {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: #ffffff;
        opacity: 0.35;
        pointer-events: none;
      }
      #foreground {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <!-- Grainient mount. Imports `ogl` from esm.sh so the file is
         self-contained — no build step needed. The shader code is
         pasted verbatim from src/components/Grainient.tsx; the
         palette + motion uniforms come from src/config/grainient.ts
         (GRAINIENT_LIGHT × GRAINIENT_MOTION). Anything that drifts
         here drifts on the live site too — keep them in sync. -->
    <script type="module">
      import { Mesh, Program, Renderer, Triangle } from "https://esm.sh/ogl@1.0.11";

      const hexToRgb = (hex) => {
        const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        if (!m) return [1, 1, 1];
        return [parseInt(m[1], 16) / 255, parseInt(m[2], 16) / 255, parseInt(m[3], 16) / 255];
      };

      const vertex = `#version 300 es
in vec2 position;
void main() { gl_Position = vec4(position, 0.0, 1.0); }
`;

      const fragment = `#version 300 es
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform float uTimeSpeed;
uniform float uColorBalance;
uniform float uWarpStrength;
uniform float uWarpFrequency;
uniform float uWarpSpeed;
uniform float uWarpAmplitude;
uniform float uBlendAngle;
uniform float uBlendSoftness;
uniform float uRotationAmount;
uniform float uNoiseScale;
uniform float uGrainAmount;
uniform float uGrainScale;
uniform float uGrainAnimated;
uniform float uContrast;
uniform float uGamma;
uniform float uSaturation;
uniform vec2 uCenterOffset;
uniform float uZoom;
uniform vec3 uColor1;
uniform vec3 uColor2;
uniform vec3 uColor3;
out vec4 fragColor;
#define S(a,b,t) smoothstep(a,b,t)
mat2 Rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
vec2 hash(vec2 p){p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));return fract(sin(p)*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float n=mix(mix(dot(-1.0+2.0*hash(i+vec2(0.0,0.0)),f-vec2(0.0,0.0)),dot(-1.0+2.0*hash(i+vec2(1.0,0.0)),f-vec2(1.0,0.0)),u.x),mix(dot(-1.0+2.0*hash(i+vec2(0.0,1.0)),f-vec2(0.0,1.0)),dot(-1.0+2.0*hash(i+vec2(1.0,1.0)),f-vec2(1.0,1.0)),u.x),u.y);return 0.5+0.5*n;}
void mainImage(out vec4 o, vec2 C){
  float t=iTime*uTimeSpeed;
  vec2 uv=C/iResolution.xy;
  float ratio=iResolution.x/iResolution.y;
  vec2 tuv=uv-0.5+uCenterOffset;
  tuv/=max(uZoom,0.001);
  float degree=noise(vec2(t*0.1,tuv.x*tuv.y)*uNoiseScale);
  tuv.y*=1.0/ratio;
  tuv*=Rot(radians((degree-0.5)*uRotationAmount+180.0));
  tuv.y*=ratio;
  float frequency=uWarpFrequency;
  float ws=max(uWarpStrength,0.001);
  float amplitude=uWarpAmplitude/ws;
  float warpTime=t*uWarpSpeed;
  tuv.x+=sin(tuv.y*frequency+warpTime)/amplitude;
  tuv.y+=sin(tuv.x*(frequency*1.5)+warpTime)/(amplitude*0.5);
  vec3 colLav=uColor1;
  vec3 colOrg=uColor2;
  vec3 colDark=uColor3;
  float b=uColorBalance;
  float s=max(uBlendSoftness,0.0);
  mat2 blendRot=Rot(radians(uBlendAngle));
  float blendX=(tuv*blendRot).x;
  float edge0=-0.3-b-s;
  float edge1=0.2-b+s;
  float v0=0.5-b+s;
  float v1=-0.3-b-s;
  vec3 layer1=mix(colDark,colOrg,S(edge0,edge1,blendX));
  vec3 layer2=mix(colOrg,colLav,S(edge0,edge1,blendX));
  vec3 col=mix(layer1,layer2,S(v0,v1,tuv.y));
  vec2 grainUv=uv*max(uGrainScale,0.001);
  if(uGrainAnimated>0.5){grainUv+=vec2(iTime*0.05);}
  float grain=fract(sin(dot(grainUv,vec2(12.9898,78.233)))*43758.5453);
  col+=(grain-0.5)*uGrainAmount;
  col=(col-0.5)*uContrast+0.5;
  float luma=dot(col,vec3(0.2126,0.7152,0.0722));
  col=mix(vec3(luma),col,uSaturation);
  col=pow(max(col,0.0),vec3(1.0/max(uGamma,0.001)));
  col=clamp(col,0.0,1.0);
  o=vec4(col,1.0);
}
void main(){ vec4 o=vec4(0.0); mainImage(o,gl_FragCoord.xy); fragColor=o; }
`;

      // Mirrors GRAINIENT_LIGHT (src/config/grainient.ts).
      const PALETTE = { color1: "#DBEAFE", color2: "#3B82F6", color3: "#EFF4FF" };

      // Mirrors Grainient.tsx defaults + GRAINIENT_MOTION overrides
      // (timeSpeed: 0.3, warpSpeed: 3, saturation: 0.3) — exactly what
      // the live page renders. The OG card is softened via the
      // #tone-down white wash in the DOM (above), not by tweaking
      // shader params here. Keeping these in lockstep with the live
      // config means a future change to GRAINIENT_MOTION lands in both
      // places without a separate calibration pass.
      const PARAMS = {
        timeSpeed: 0.3,
        colorBalance: 0.0,
        warpStrength: 1.0,
        warpFrequency: 5.0,
        warpSpeed: 3.0,
        warpAmplitude: 50.0,
        blendAngle: 0.0,
        blendSoftness: 0.05,
        rotationAmount: 500.0,
        noiseScale: 2.0,
        grainAmount: 0.1,
        grainScale: 2.0,
        grainAnimated: 0.0,
        contrast: 1.5,
        gamma: 1.0,
        saturation: 0.3,
        centerX: 0.0,
        centerY: 0.0,
        zoom: 0.9,
      };

      const host = document.getElementById("grainient-host");
      const renderer = new Renderer({ webgl: 2, alpha: true, antialias: false, dpr: 2 });
      const gl = renderer.gl;
      const canvas = gl.canvas;
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      host.appendChild(canvas);

      const geometry = new Triangle(gl);
      const program = new Program(gl, {
        vertex,
        fragment,
        uniforms: {
          iTime: { value: 0 },
          iResolution: { value: new Float32Array([1, 1]) },
          uTimeSpeed: { value: PARAMS.timeSpeed },
          uColorBalance: { value: PARAMS.colorBalance },
          uWarpStrength: { value: PARAMS.warpStrength },
          uWarpFrequency: { value: PARAMS.warpFrequency },
          uWarpSpeed: { value: PARAMS.warpSpeed },
          uWarpAmplitude: { value: PARAMS.warpAmplitude },
          uBlendAngle: { value: PARAMS.blendAngle },
          uBlendSoftness: { value: PARAMS.blendSoftness },
          uRotationAmount: { value: PARAMS.rotationAmount },
          uNoiseScale: { value: PARAMS.noiseScale },
          uGrainAmount: { value: PARAMS.grainAmount },
          uGrainScale: { value: PARAMS.grainScale },
          uGrainAnimated: { value: PARAMS.grainAnimated },
          uContrast: { value: PARAMS.contrast },
          uGamma: { value: PARAMS.gamma },
          uSaturation: { value: PARAMS.saturation },
          uCenterOffset: { value: new Float32Array([PARAMS.centerX, PARAMS.centerY]) },
          uZoom: { value: PARAMS.zoom },
          uColor1: { value: new Float32Array(hexToRgb(PALETTE.color1)) },
          uColor2: { value: new Float32Array(hexToRgb(PALETTE.color2)) },
          uColor3: { value: new Float32Array(hexToRgb(PALETTE.color3)) },
        },
      });

      const mesh = new Mesh(gl, { geometry, program });

      // Size to the host (1200 × 630) with dpr=2 so the captured PNG
      // is sharp at the OG-card display size.
      const rect = host.getBoundingClientRect();
      renderer.setSize(Math.floor(rect.width), Math.floor(rect.height));
      const res = program.uniforms.iResolution.value;
      res[0] = gl.drawingBufferWidth;
      res[1] = gl.drawingBufferHeight;

      // Pin time to a specific value so renders are reproducible. The
      // shader is deterministic for a given (iTime, iResolution,
      // palette, params) — same screenshot every time.
      program.uniforms.iTime.value = 12.0;
      renderer.render({ scene: mesh });

      // Signal readiness so the headless screenshotter knows when the
      // first paint has flushed to the canvas.
      window.__grainientReady = true;
    </script>
  </body>
</html>
