<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="4" x2="0" y2="44">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="docGrad" x1="16" y1="14" x2="34" y2="36">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EFF4FF" />
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Logo (scaled 2.5x, centered above text) -->
  <g transform="translate(540, 140) scale(2.5)">
    <!-- OUTER SHIELD -->
    <path d="M24 2 L42 9.5 V25.5 C42 37 33 43 24 46 C15 43 6 37 6 25.5 V9.5 L24 2Z" fill="url(#shieldGrad)" stroke="rgba(255,255,255,0.10)" stroke-width="0.6" />
    <!-- INNER GLOW -->
    <path d="M24 2 L42 9.5 V25.5 C42 37 33 43 24 46 C15 43 6 37 6 25.5 V9.5 L24 2Z" fill="url(#innerGlow)" />
    <!-- HIGHLIGHT -->
    <path d="M24 4.2 L40.05 10.7 V24.8 C40.05 35.6 31.8 41.4 24 43.6 V4.2Z" fill="url(#highlight)" />
    <!-- DOCUMENT -->
    <g>
      <path d="M15.5 14 C15.5 13.4 15.9 13 16.5 13 H27.8 L32.5 17.5 V33 C32.5 33.6 32.1 34 31.5 34 H16.5 C15.9 34 15.5 33.6 15.5 33 V14Z" fill="url(#docGrad)" stroke="#DBEAFE" stroke-width="0.7" />
      <path d="M27.8 13V17.5H32.5" fill="#DBEAFE" />
    </g>
    <!-- BINARY -->
    <g>
      <circle cx="19.5" cy="21" r="1" fill="#1D4ED8" />
      <circle cx="24" cy="21" r="1" fill="#93C5FD" />
      <circle cx="28.5" cy="21" r="1" fill="#1D4ED8" />
      <circle cx="19.5" cy="25" r="1" fill="#93C5FD" />
      <circle cx="24" cy="25" r="1" fill="#1D4ED8" />
      <circle cx="28.5" cy="25" r="1" fill="#93C5FD" />
      <circle cx="19.5" cy="29" r="1" fill="#1D4ED8" />
      <circle cx="24" cy="29" r="1" fill="#93C5FD" />
      <circle cx="28.5" cy="29" r="1" fill="#1D4ED8" />
    </g>
  </g>

  <!-- App name -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#F8FAFC" letter-spacing="-1">CloakPDF</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#94A3B8">Free Offline PDF Toolkit</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500">
    <rect x="240" y="500" width="100" height="32" rx="16" fill="#1E3A8A" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1" />
    <text x="290" y="521" text-anchor="middle" fill="#93C5FD">Merge</text>

    <rect x="360" y="500" width="90" height="32" rx="16" fill="#1E3A8A" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1" />
    <text x="405" y="521" text-anchor="middle" fill="#93C5FD">Split</text>

    <rect x="470" y="500" width="120" height="32" rx="16" fill="#1E3A8A" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1" />
    <text x="530" y="521" text-anchor="middle" fill="#93C5FD">Compress</text>

    <rect x="610" y="500" width="100" height="32" rx="16" fill="#1E3A8A" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1" />
    <text x="660" y="521" text-anchor="middle" fill="#93C5FD">Rotate</text>

    <rect x="730" y="500" width="90" height="32" rx="16" fill="#1E3A8A" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1" />
    <text x="775" y="521" text-anchor="middle" fill="#93C5FD">Sign</text>

    <rect x="840" y="500" width="120" height="32" rx="16" fill="#1E3A8A" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1" />
    <text x="900" y="521" text-anchor="middle" fill="#93C5FD">&amp; More</text>
  </g>

  <!-- Privacy badge -->
  <text x="600" y="585" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#64748B">No uploads · 100% browser-based · Completely private</text>
</svg>
