<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="50%" stop-color="#EEF2FF" />
      <stop offset="100%" stop-color="#F8FAFC" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="4" x2="0" y2="44">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="docGrad" x1="16" y1="14" x2="34" y2="36">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EFF4FF" />
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Logo (scaled 3.5x) -->
  <g transform="translate(516, 40) scale(3.5)">
    <path d="M24 2 L42 9.5 V25.5 C42 37 33 43 24 46 C15 43 6 37 6 25.5 V9.5 L24 2Z" fill="url(#shieldGrad)" stroke="rgba(255,255,255,0.10)" stroke-width="0.6" />
    <path d="M24 2 L42 9.5 V25.5 C42 37 33 43 24 46 C15 43 6 37 6 25.5 V9.5 L24 2Z" fill="url(#innerGlow)" />
    <path d="M24 4.2 L40.05 10.7 V24.8 C40.05 35.6 31.8 41.4 24 43.6 V4.2Z" fill="url(#highlight)" />
    <g>
      <path d="M15.5 14 C15.5 13.4 15.9 13 16.5 13 H27.8 L32.5 17.5 V33 C32.5 33.6 32.1 34 31.5 34 H16.5 C15.9 34 15.5 33.6 15.5 33 V14Z" fill="url(#docGrad)" stroke="#DBEAFE" stroke-width="0.7" />
      <path d="M27.8 13V17.5H32.5" fill="#DBEAFE" />
    </g>
    <g>
      <circle cx="19.5" cy="21" r="1" fill="#1D4ED8" />
      <circle cx="24" cy="21" r="1" fill="#93C5FD" />
      <circle cx="28.5" cy="21" r="1" fill="#1D4ED8" />
      <circle cx="19.5" cy="25" r="1" fill="#93C5FD" />
      <circle cx="24" cy="25" r="1" fill="#1D4ED8" />
      <circle cx="28.5" cy="25" r="1" fill="#93C5FD" />
      <circle cx="19.5" cy="29" r="1" fill="#1D4ED8" />
      <circle cx="24" cy="29" r="1" fill="#93C5FD" />
      <circle cx="28.5" cy="29" r="1" fill="#1D4ED8" />
    </g>
  </g>

  <!-- App name -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#1E293B" letter-spacing="-1.5">CloakPDF</text>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#6366F1">Offline PDF Tools — 100% Private, Runs in Your Browser</text>

  <!-- Subtle divider -->
  <rect x="530" y="342" width="140" height="1.5" rx="0.75" fill="#C7D2FE" fill-opacity="0.5" />

  <!-- Category cards — 2x2 grid -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <!-- Organise & Edit — blue -->
    <rect x="220" y="365" width="340" height="60" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2" />
    <circle cx="258" cy="395" r="15" fill="#DBEAFE" />
    <path d="M252 395h12M258 389v12" stroke="#2563EB" stroke-width="2" stroke-linecap="round" />
    <text x="284" y="391" font-size="17" font-weight="600" fill="#1E40AF">Organise &amp; Edit</text>
    <text x="284" y="408" font-size="12" font-weight="400" fill="#3B82F6">Merge, split, reorder, rotate &amp; more</text>

    <!-- Transform & Convert — violet -->
    <rect x="640" y="365" width="340" height="60" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.2" />
    <circle cx="678" cy="395" r="15" fill="#EDE9FE" />
    <path d="M672 392l6-6m0 0v5m0-5h-5M684 398l-6 6m0 0v-5m0 5h5" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    <text x="704" y="391" font-size="17" font-weight="600" fill="#5B21B6">Transform &amp; Convert</text>
    <text x="704" y="408" font-size="12" font-weight="400" fill="#7C3AED">Compress, convert, crop &amp; optimize</text>

    <!-- Annotate & Sign — emerald -->
    <rect x="220" y="440" width="340" height="60" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.2" />
    <circle cx="258" cy="470" r="15" fill="#D1FAE5" />
    <path d="M252 473l3 3 7-8" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="284" y="466" font-size="17" font-weight="600" fill="#065F46">Annotate &amp; Sign</text>
    <text x="284" y="483" font-size="12" font-weight="400" fill="#059669">Watermark, stamp, sign &amp; number</text>

    <!-- Security & Properties — amber -->
    <rect x="640" y="440" width="340" height="60" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.2" />
    <circle cx="678" cy="470" r="15" fill="#FEF3C7" />
    <path d="M675 472v-3a3 3 0 0 1 6 0v3M673 472h10a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-10a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1z" stroke="#B45309" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="704" y="466" font-size="17" font-weight="600" fill="#92400E">Security &amp; Properties</text>
    <text x="704" y="483" font-size="12" font-weight="400" fill="#B45309">Encrypt, redact, metadata &amp; inspect</text>
  </g>

  <!-- Privacy line -->
  <text x="600" y="555" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#64748B">No uploads  ·  No servers  ·  Works offline  ·  Open source</text>

  <!-- Bottom accent line -->
  <rect x="450" y="580" width="300" height="3" rx="1.5" fill="#818CF8" fill-opacity="0.3" />
</svg>
