<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Base background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FAFAFB" />
    </linearGradient>

    <!-- Aurora blobs -->
    <radialGradient id="auroraPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBCFE8" stop-opacity="0.85" />
      <stop offset="60%" stop-color="#FBCFE8" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#FBCFE8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.85" />
      <stop offset="60%" stop-color="#C4B5FD" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFDBFE" stop-opacity="0.85" />
      <stop offset="60%" stop-color="#BFDBFE" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#BFDBFE" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraMint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BBF7D0" stop-opacity="0.65" />
      <stop offset="60%" stop-color="#BBF7D0" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#BBF7D0" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraPeach" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FED7AA" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#FED7AA" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FED7AA" stop-opacity="0" />
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Aurora blobs -->
  <ellipse cx="980"  cy="180" rx="360" ry="280" fill="url(#auroraPink)" />
  <ellipse cx="1100" cy="420" rx="380" ry="300" fill="url(#auroraPurple)" />
  <ellipse cx="120"  cy="500" rx="340" ry="280" fill="url(#auroraPeach)" />
  <ellipse cx="200"  cy="120" rx="320" ry="240" fill="url(#auroraBlue)" />
  <ellipse cx="850"  cy="560" rx="300" ry="220" fill="url(#auroraMint)" />
  <ellipse cx="600"  cy="320" rx="420" ry="240" fill="url(#auroraPurple)" />

  <!-- Top bar: Logo + Privacy badge -->
  <!-- Shield logo -->
  <g transform="translate(60, 38) scale(1.05)">
    <path d="M24 3 L41 10 V25 C41 36 33 42.5 24 45.5 C15 42.5 7 36 7 25 V10 L24 3Z"
          fill="url(#shieldGrad)" />
    <path d="M16.5 12 L28 12 L33 17 L33 34.5 A1.5 1.5 0 0 1 31.5 36 L16.5 36 A1.5 1.5 0 0 1 15 34.5 L15 13.5 A1.5 1.5 0 0 1 16.5 12 Z"
          fill="#FFFFFF" opacity="0.95" />
    <path d="M28 12 L28 15.5 A1.5 1.5 0 0 0 29.5 17 L33 17 Z"
          fill="#DBEAFE" opacity="0.85" />
    <g fill="#1D4ED8" opacity="0.8">
      <rect x="19" y="19" width="10" height="1.8" rx="0.9" />
      <rect x="19" y="23" width="8"  height="1.8" rx="0.9" />
      <rect x="19" y="27" width="11" height="1.8" rx="0.9" />
      <rect x="19" y="31" width="6"  height="1.8" rx="0.9" />
    </g>
  </g>
  <text x="120" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#0F172A" letter-spacing="-0.5">
    Cloak<tspan fill="#2563EB">PDF</tspan>
  </text>

  <!-- Hero: "PDF tools that stay on your device." -->
  <text x="600" y="245" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="84" font-weight="700" fill="#0F172A" letter-spacing="-2.5">
    PDF tools that <tspan font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="400" fill="#2563EB">stay on your</tspan>
  </text>
  <text x="600" y="340" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="84" font-style="italic" font-weight="400" fill="#2563EB" letter-spacing="-2">
    device<tspan fill="#0F172A" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-style="normal" font-weight="700">.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#475569">
    Edit, merge, sign, secure, and convert PDFs entirely in your browser.
  </text>
  <text x="600" y="443" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#475569">
    No uploads, no accounts, no tracking.
  </text>

  <!-- Footer meta -->
  <text x="600" y="575" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="15" font-weight="600" fill="#64748B" letter-spacing="2.5">
    35 OFFLINE PDF TOOLS  ·  WORKS OFFLINE  ·  OPEN SOURCE
  </text>
</svg>
