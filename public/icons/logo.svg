<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="0 0 144 144" role="img" aria-label="CloakPDF" style="fill-rule:evenodd;clip-rule:evenodd;">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="rgb(59,130,246)"/>
            <stop offset="1" stop-color="rgb(29,78,216)"/>
        </linearGradient>
        <radialGradient id="bloom" gradientUnits="userSpaceOnUse" cx="72" cy="55" r="100">
            <stop offset="0" stop-color="white" stop-opacity="0.3"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <!-- Shield + content authored in the original 144-coord space.
             Scaled at the use-site so coordinates stay readable and the
             whole mark can be retuned by changing one number. -->
        <path id="shield" d="M72,30L38,44L38,76C38,93.333 49.333,107.333 72,118C94.667,107.333 106,93.333 106,76L106,44L72,30Z"/>
        <clipPath id="shieldClip">
            <path d="M72,30L38,44L38,76C38,93.333 49.333,107.333 72,118C94.667,107.333 106,93.333 106,76L106,44L72,30Z"/>
        </clipPath>
    </defs>

    <!-- Full-bleed background so the OS launcher mask has no transparent padding to crop -->
    <rect width="144" height="144" fill="url(#bg)"/>
    <rect width="144" height="144" fill="url(#bloom)"/>

    <!-- Shield + inner content scaled 1.1× around canvas center.
         Leaves ~15% top/bottom and ~24% side breathing room so the
         shield's tip and shoulders don't get clipped by the OS
         squircle / circular launcher mask. -->
    <g transform="translate(72 72) scale(1.1) translate(-72 -72)">
        <use href="#shield" fill="white" fill-opacity="0.18"/>
        <use href="#shield" fill="none" stroke="white" stroke-opacity="0.55" stroke-width="3"/>
        <g clip-path="url(#shieldClip)">
            <!-- Redacted document lines — three horizontal bars decreasing
                 in length and opacity. Reads as a partially-redacted page
                 at every size from 32 px favicon to 512 px launcher icon.
                 Stroke-width 6 + round caps per spec; positioned inside
                 the shield's safe band (y: 60–92). -->
            <g stroke="white" stroke-width="6" stroke-linecap="round">
                <line x1="52" y1="60" x2="92" y2="60"/>
                <line x1="52" y1="76" x2="84" y2="76" stroke-opacity="0.75"/>
                <line x1="52" y1="92" x2="76" y2="92" stroke-opacity="0.5"/>
            </g>
        </g>
    </g>
</svg>
